name: Manual Release

on:
  workflow_dispatch:
    inputs:
      summary:
        description: "Optional summary (markdown supported)"
        required: false
        default: ""

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version from manifest
        id: get_version
        run: |
          VERSION=$(jq -r .version custom_components/gree_custom/manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get latest tag
        id: latest_tag
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Check if version already released
        run: |
          VERSION="v${{ steps.get_version.outputs.version }}"
          TAG="${{ steps.latest_tag.outputs.tag }}"

          if [ "$VERSION" = "$TAG" ]; then
            echo "[ERROR] Version $VERSION already released"
            exit 1
          else
            echo "New version: $VERSION (latest was: $TAG)"
          fi

      - name: Determine if prerelease
        id: prerelease
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          if [[ "$VERSION" == *"alpha"* || "$VERSION" == *"beta"* || "$VERSION" == *"rc"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Prepare body
        id: body
        run: |
          if [ -z "${{ github.event.inputs.summary }}" ]; then
            echo "body=" >> $GITHUB_OUTPUT
          else
            echo "body=${{ github.event.inputs.summary }}\n\n---" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: v${{ steps.get_version.outputs.version }}

          body: ${{ steps.body.outputs.body }}
          generate_release_notes: true

          prerelease: ${{ steps.prerelease.outputs.prerelease }}

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}